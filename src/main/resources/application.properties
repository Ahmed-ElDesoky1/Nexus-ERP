# ===== Server Configuration =====
server.port=8081

# ===== Application Name =====
spring.application.name=ERP-System

# ===== Database Configuration (MySQL / XAMPP) =====
spring.datasource.url=jdbc:mysql://localhost:3306/erp_system_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate Configuration =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===== Jackson Configuration =====
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ===== Logging Configuration =====
logging.level.root=INFO
logging.level.com.company.erp_system=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# \u062A\u062A\u0628\u0639 \u0639\u0645\u0644\u064A\u0627\u062A \u0627\u0644\u0623\u0645\u0627\u0646 (Security Debugging)
logging.level.org.springframework.security=DEBUG
